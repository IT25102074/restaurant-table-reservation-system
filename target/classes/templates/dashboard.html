<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Restaurant Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Restaurant Reservation</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">Manage Users</a>
                </li>
            </ul>
            <span class="navbar-text me-3">
                Welcome, <strong th:text="${username}">User</strong>!
            </span>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            
            <div th:if="${param.reserved}" class="alert alert-success">Reservation created successfully!</div>
            <div th:if="${param.updated}" class="alert alert-info">Reservation updated successfully!</div>
            <div th:if="${param.deleted}" class="alert alert-warning">Reservation deleted successfully!</div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 th:text="${isAdmin} ? 'All Reservations' : 'My Reservations'">Reservations</h2>
                <a th:href="@{/reservations/new}" class="btn btn-primary" th:if="${!isAdmin}">Make a Reservation</a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <div th:if="${reservations.empty}" class="alert alert-info">
                        No reservations found.
                    </div>
                    
                    <div class="table-responsive" th:if="${!reservations.empty}">
                        <table class="table table-hover table-striped">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th th:if="${isAdmin}">User</th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Guests</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="res : ${reservations}">
                                    <td th:text="${res.id}">1</td>
                                    <td th:if="${isAdmin}" th:text="${res.user.username}">user</td>
                                    <td th:text="${res.date}">2023-12-01</td>
                                    <td th:text="${res.time}">19:00</td>
                                    <td th:text="${res.numberOfGuests}">2</td>
                                    <td>
                                        <!-- Admins can't edit reservations directly in this simple version, but could delete -->
                                        <a th:href="@{/reservations/edit/{id}(id=${res.id})}" class="btn btn-sm btn-outline-primary" th:if="${!isAdmin}">Edit</a>
                                        <a th:href="@{/reservations/delete/{id}(id=${res.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure?')">Delete</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
