<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${reservation.id == null ? 'New Reservation' : 'Edit Reservation'}">Reservation Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Restaurant Reservation</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${reservation.id == null ? 'Make a Reservation' : 'Edit Reservation'}">Reservation Form</h4>
                </div>
                <div class="card-body p-4">
                    
                    <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="${reservation.id == null ? '/reservations/new' : '/reservations/update/' + reservation.id}" 
                          th:object="${reservation}" method="post">
                        
                        <div class="mb-3">
                            <label for="date" class="form-label">Date</label>
                            <input type="date" class="form-control" id="date" th:field="*{date}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="time" class="form-label">Time</label>
                            <input type="time" class="form-control" id="time" th:field="*{time}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('time')}" th:errors="*{time}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="numberOfGuests" class="form-label">Number of Guests</label>
                            <input type="number" min="1" max="20" class="form-control" id="numberOfGuests" th:field="*{numberOfGuests}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('numberOfGuests')}" th:errors="*{numberOfGuests}"></div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/dashboard}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary" th:text="${reservation.id == null ? 'Confirm Reservation' : 'Update Reservation'}">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
